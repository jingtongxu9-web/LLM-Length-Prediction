defaults: ../base.yaml
stage: offline_prior

target: output_length

ridge:
  standardize: true
  alpha: 1.0

baselines:
  - global_mean
  - prompt_token_count
  - ridge_probe

distribution:
  families: [normal, lognormal]
  fit: maximum_likelihood

reports:
  - length_histogram
  - log_length_qq
  - layer_sweep
  - tail_underestimation
