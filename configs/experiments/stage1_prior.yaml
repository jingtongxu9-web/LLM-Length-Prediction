defaults: ../base.yaml
stage: offline_prior

target: log1p_output_tokens

ridge:
  standardize: true
  alpha: 1.0
  residual_variance: maximum_likelihood

prior:
  distribution: shifted_lognormal
  location: predicted_log1p_output_tokens
  mean_output_tokens: exp(location + residual_variance / 2) - 1

baselines:
  - global_mean
  - prompt_token_count
  - ridge_probe

distribution:
  families: [normal, lognormal]
  fit: maximum_likelihood

reports:
  - length_histogram
  - log_length_qq
  - layer_sweep
  - tail_underestimation
